# Tracked-repo list (D8). A list from day one: adding a repo is a new
# [[repos]] entry, not a code change.

# Global tuning defaults; every [[repos]] entry may override any of these
# per-repo by setting the same key inside its own section. The values shown
# here are the built-in defaults — the section can be omitted entirely.
[defaults]
# Event when a headline row rises more than this % over its rolling median.
# Measured run-to-run ratio noise on the trial box was ~1-2% stdev, so 5% is
# ~4 sigma; recalibrate from state.json's recent_ratios after ~20 real runs
# on the production box (built-in fallback stays at 10).
regression_threshold_pct = 5.0
# A latched row recovers only when back within this % of its frozen median
# (must be <= regression_threshold_pct). Unset = same as the regression
# threshold, i.e. no hysteresis; set lower if alternating regression/recovery
# event pairs show up from rows oscillating around the threshold.
# recovery_threshold_pct = 2.5
# Instructions lane: event when a headline row's instruction-count ratio
# rises more than this % over its rolling median (built-in: 2.0). Counts are
# deterministic — the threshold only needs headroom for incidental codegen
# shifts, not run-to-run noise; recalibrate after ~20 real runs.
# instr_regression_threshold_pct = 2.0
# Instructions-lane recovery threshold (hysteresis; must be <= the
# instructions regression threshold). Unset = same as that threshold.
# instr_recovery_threshold_pct = 1.0
# How many healthy (non-regressed) runs feed the rolling median.
rolling_window = 20
# Commits per trend digest.
digest_batch_size = 10
# Cargo profile for `cargo bench`. Unset = cargo's default bench profile —
# keeping numbers comparable with the scheduled walltime layer (mega-evm's
# per-PR walltime flow has been superseded by CodSpeed instruction-count CI).
# bench_profile = "profiling"

[[repos]]
name = "mega-evm"
github = "megaeth-labs/mega-evm"
branch = "main"
clone_url = "https://github.com/megaeth-labs/mega-evm.git"
bench_targets = ["transact", "revm_bench", "mega_bench", "comp_cost", "block_bench"]
# The subject every ratio is computed against.
baseline_subject = "revm_pinned"
# Subject patterns that headline this repo (exact, or trailing-* prefix).
headline_subjects = ["rex5", "rex5_*"]
# Optional column order for the comparison table; unlisted subjects follow
# alphabetically. Omit to default to baseline-first.
subject_order = [
  "revm_pinned", "revm_latest", "op_revm_pinned", "op_revm_latest",
  "equivalence", "mini_rex", "rex4", "rex5",
]

# Instruction-count lane (CodSpeed runner offline mode): deterministic Ir
# counts per benchmark beside the walltime numbers. Only runs on Linux hosts
# with the codspeed CLI + cargo-codspeed provisioned; skipped (with a stderr
# note) elsewhere. No bench_filter = run every built bench.
[repos.instructions]
# Make a run whose instructions lane skips (non-Linux host, tools missing,
# compat dep absent) or fails any target exit nonzero — only after all
# walltime artifacts, events, state, and latest.json are written, so the
# on-disk data stays valid and the exit code is purely a scheduler signal.
# Unset (false) = the lane stays best-effort. Turn on once the host is
# provisioned so a broken installation cannot silently produce
# walltime-only runs.
# require_instructions = true

[repos.flamegraph]
bench_target = "mega_bench"
profile_secs = 30
retention_days = 30
workloads = [
  { baseline = "salt_dynamic_gas/revm_pinned/sstore_100", feature = "salt_dynamic_gas/rex5_salt/sstore_100" },
]
