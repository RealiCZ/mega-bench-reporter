name: Release

# Publishes the deployable binary when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
# Builds the Linux x86_64 binary (the mega-engineer deploy target), packs it
# as a tar.gz with a sha256 alongside, and attaches both to a GitHub Release.

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write # create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked

      - name: Pack artifact
        run: |
          set -euo pipefail
          NAME="mega-bench-reporter-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          mkdir "$NAME"
          cp target/release/mega-bench-reporter "$NAME/"
          cp README.md repos.toml "$NAME/"
          tar czf "$NAME.tar.gz" "$NAME"
          sha256sum "$NAME.tar.gz" > "$NAME.tar.gz.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            mega-bench-reporter-*.tar.gz mega-bench-reporter-*.tar.gz.sha256
