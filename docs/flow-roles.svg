<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1420 1300" width="1420" height="1300">
  <style>text { font-family: "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif; }</style>
  <defs>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1420" height="1300" fill="#ffffff"/>
  <text x="620" y="30" text-anchor="middle" font-size="19" font-weight="600" fill="#111827">mega-bench-reporter 全流程时序 — 按角色</text>
  <rect x="55" y="48" width="190" height="48" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="150" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">mega-evm</text>
  <text x="150" y="86" text-anchor="middle" font-size="10.5" fill="#6b7280">GitHub 仓库（被测对象）</text>
  <rect x="315" y="48" width="170" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="400" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">BB9</text>
  <text x="400" y="86" text-anchor="middle" font-size="10.5" fill="#6b7280">编排 agent：轮询·触发·投递</text>
  <rect x="545" y="48" width="230" height="48" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="660" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">mega-bench-reporter</text>
  <text x="660" y="86" text-anchor="middle" font-size="10.5" fill="#6b7280">CLI @ mega-engineer（全部计算）</text>
  <rect x="840" y="48" width="180" height="48" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="930" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">data-root</text>
  <text x="930" y="86" text-anchor="middle" font-size="10.5" fill="#6b7280">磁盘存储 data-root/mega-evm/</text>
  <rect x="1055" y="48" width="130" height="48" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="1120" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Lark 群</text>
  <text x="1120" y="86" text-anchor="middle" font-size="10.5" fill="#6b7280">告警/恢复/趋势卡的终点</text>
  <line x1="150" y1="96" x2="150" y2="1240" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,5"/>
  <line x1="400" y1="96" x2="400" y2="1240" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,5"/>
  <line x1="660" y1="96" x2="660" y2="1240" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,5"/>
  <line x1="930" y1="96" x2="930" y2="1240" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,5"/>
  <line x1="1120" y1="96" x2="1120" y2="1240" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,5"/>
  <rect x="60" y="120" width="1300" height="650" rx="6" fill="none" stroke="#9ca3af" stroke-width="1.3"/>
  <rect x="60" y="120" width="293" height="26" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="70" y="138" font-size="13.5" font-weight="600" fill="#374151">流程 A · 每次提交（BB9 轮询触发）</text>
  <rect x="655" y="255" width="10" height="430" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <line x1="400" y1="175" x2="150" y2="175" stroke="#ea580c" stroke-width="1.7" marker-end="url(#arr-orange)"/>
  <rect x="98" y="155" width="355" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="275" y="168" text-anchor="middle" font-size="12.5" fill="#111827">1. git ls-remote 轮询（每 5-15 分钟）</text>
  <line x1="150" y1="213" x2="400" y2="213" stroke="#6b7280" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <rect x="190" y="193" width="171" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="275" y="206" text-anchor="middle" font-size="12.5" fill="#111827">发现新 commit sha</text>
  <line x1="400" y1="255" x2="655" y2="255" stroke="#ea580c" stroke-width="1.7" marker-end="url(#arr-orange)"/>
  <rect x="350" y="235" width="355" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="527" y="248" text-anchor="middle" font-size="12.5" fill="#111827">2. run --repo mega-evm --sha X</text>
  <path d="M 670,288 h 28 v 15 h -24" fill="none" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
  <rect x="705" y="286" width="182" height="19" fill="#ffffff" opacity="0.95"/>
  <text x="710" y="300" font-size="12.5" fill="#111827">3. 加仓库级排他锁（防并发）</text>
  <line x1="655" y1="340" x2="150" y2="340" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arr-blue)"/>
  <rect x="213" y="320" width="378" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="402" y="333" text-anchor="middle" font-size="12.5" fill="#111827">4. fetch + checkout X（含子模块，脏树自愈）</text>
  <path d="M 670,373 h 28 v 15 h -24" fill="none" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
  <rect x="705" y="371" width="665" height="19" fill="#ffffff" opacity="0.95"/>
  <text x="710" y="385" font-size="12.5" fill="#111827">5. cargo bench 逐 target（与 mega-evm CI 同参数，单 target 失败不致命）</text>
  <path d="M 670,423 h 28 v 15 h -24" fill="none" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
  <rect x="705" y="421" width="562" height="19" fill="#ffffff" opacity="0.95"/>
  <text x="710" y="435" font-size="12.5" fill="#111827">6. 解析 criterion JSON 树，算每行 ratio_vs_revm_pinned</text>
  <line x1="665" y1="478" x2="930" y2="478" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
  <rect x="583" y="458" width="562" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="797" y="471" text-anchor="middle" font-size="12" fill="#111827">7. 写 commits/日期-sha/（raw/events/表/图）+ latest.json</text>
  <line x1="665" y1="520" x2="930" y2="520" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
  <rect x="605" y="500" width="385" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="797" y="513" text-anchor="middle" font-size="12" fill="#111827">8. state.json：滚动中位数判回归 + digest 计数</text>
  <path d="M 670,553 h 28 v 15 h -24" fill="none" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
  <rect x="705" y="551" width="493" height="19" fill="#ffffff" opacity="0.95"/>
  <text x="710" y="565" font-size="12.5" fill="#111827">9. 记录事件：回归/恢复（当次）；满 10 次 digest → digests/</text>
  <line x1="655" y1="620" x2="400" y2="620" stroke="#6b7280" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <rect x="252" y="600" width="550" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="527" y="613" text-anchor="middle" font-size="12.5" fill="#111827">10. stdout JSON: sha / failed_targets / events[]</text>
  <line x1="400" y1="668" x2="1120" y2="668" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arr-blue)"/>
  <rect x="554" y="648" width="401" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="760" y="661" text-anchor="middle" font-size="12.5" fill="#111827">11. 对比 latest.sha 与已发标记 → 读数据自己拼卡发</text>
  <text x="760" y="700" text-anchor="middle" font-size="11.5" fill="#6b7280">卡片由 BB9 按 skill/lark-card.md 自拼：红=回归 · 黄=预警 · 绿=正常</text>
  <rect x="60" y="800" width="1300" height="400" rx="6" fill="none" stroke="#9ca3af" stroke-width="1.3"/>
  <rect x="60" y="800" width="345" height="26" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="70" y="818" font-size="13.5" font-weight="600" fill="#374151">流程 B · 每晚火焰图（定时纯存档 · 不发卡）</text>
  <rect x="655" y="855" width="10" height="280" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <line x1="400" y1="855" x2="655" y2="855" stroke="#ea580c" stroke-width="1.7" marker-end="url(#arr-orange)"/>
  <rect x="258" y="835" width="539" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="527" y="848" text-anchor="middle" font-size="12.5" fill="#111827">1. flamegraph --repo mega-evm（cron / BB9 定时均可）</text>
  <line x1="655" y1="900" x2="150" y2="900" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arr-blue)"/>
  <rect x="231" y="880" width="343" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="402" y="893" text-anchor="middle" font-size="12.5" fill="#111827">2. fetch + checkout 分支最新 HEAD</text>
  <path d="M 670,933 h 28 v 15 h -24" fill="none" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
  <rect x="705" y="931" width="654" height="19" fill="#ffffff" opacity="0.95"/>
  <text x="710" y="945" font-size="12.5" fill="#111827">3. cargo bench --no-run --profile profiling；--list 校验 id</text>
  <path d="M 670,983 h 28 v 15 h -24" fill="none" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
  <rect x="705" y="981" width="642" height="19" fill="#ffffff" opacity="0.95"/>
  <text x="710" y="995" font-size="12.5" fill="#111827">4. 采样：Linux perf / macOS sample（baseline 与 feature 各一次）</text>
  <path d="M 670,1033 h 28 v 15 h -24" fill="none" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
  <rect x="705" y="1031" width="470" height="19" fill="#ffffff" opacity="0.95"/>
  <text x="710" y="1045" font-size="12.5" fill="#111827">5. inferno 折叠 + 符号去混淆 → 每负载 SVG + 差分 SVG</text>
  <line x1="665" y1="1088" x2="930" y2="1088" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
  <rect x="610" y="1068" width="374" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="797" y="1081" text-anchor="middle" font-size="12" fill="#111827">6. 写 flame/日期/*.svg + 按保留期清理（纯存档）</text>
  <line x1="655" y1="1130" x2="400" y2="1130" stroke="#6b7280" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <rect x="350" y="1110" width="355" height="17" fill="#ffffff" opacity="0.95"/>
  <text x="527" y="1123" text-anchor="middle" font-size="12.5" fill="#111827">7. stdout JSON（cards 恒为空，无需投递）</text>
  <text x="540" y="1172" text-anchor="middle" font-size="11.5" fill="#6b7280">查看方式：直接打开 flame/日期/*.svg（浏览器内可交互缩放）· 不发任何 Lark 卡</text>
  <g transform="translate(70, 1258)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#ea580c" stroke-width="1.7" marker-end="url(#arr-orange)"/>
    <text x="40" y="12" font-size="12" fill="#6b7280">触发 / 控制</text>
    <line x1="290" y1="8" x2="324" y2="8" stroke="#2563eb" stroke-width="1.7" marker-end="url(#arr-blue)"/>
    <text x="330" y="12" font-size="12" fill="#6b7280">主流程 / 投递</text>
    <line x1="580" y1="8" x2="614" y2="8" stroke="#16a34a" stroke-width="1.7" marker-end="url(#arr-green)"/>
    <text x="620" y="12" font-size="12" fill="#6b7280">计算与数据读写（reporter 内部）</text>
    <line x1="870" y1="8" x2="904" y2="8" stroke="#6b7280" stroke-width="1.7" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
    <text x="910" y="12" font-size="12" fill="#6b7280">返回结果（stdout JSON）</text>
  </g>
</svg>