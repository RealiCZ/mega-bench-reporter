# Only stable rustfmt options — this project formats on the stable toolchain
# (local and CI). The nightly-only options that used to sit here
# (wrap_comments, comment_width, imports_granularity, binop_separator,
# trailing_comma, trailing_semicolon, format_code_in_doc_comments,
# doc_comment_code_block_width) were silently ignored on stable and have been
# removed rather than left as false promises; reinstate them only if fmt moves
# to a pinned nightly everywhere at once.
reorder_imports = true
use_small_heuristics = "Max"
use_field_init_shorthand = true
